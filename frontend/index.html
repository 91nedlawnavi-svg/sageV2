<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<title>elliot@archnode</title>
<style>
  :root {
    --bg:        #0f0f0f;
    --bg2:       #171717;
    --bg3:       #1f1f1f;
    --bg4:       #262626;
    --border:    #2a2a2a;
    --border2:   #333333;
    --text:      #efefef;
    --muted:     #737373;
    --soft:      #a3a3a3;
    --accent:    #efefef;
    --accent-dim:#404040;
    --user-bg:   #1a1a1a;
    --ai-bg:     #0f0f0f;
    --radius:    12px;
    --mono:      ui-monospace, 'SF Mono', 'Cascadia Code', 'Fira Code', monospace;
    --sans:      -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-size: 14px;
    line-height: 1.6;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }

  #app {
    display: flex;
    flex-direction: column;
    height: 100dvh;
    max-width: 760px;
    margin: 0 auto;
    position: relative;
  }

  /* ── Header ── */
  #header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 16px;
    height: 56px;
    border-bottom: 1px solid var(--border);
    background: var(--bg);
    flex-shrink: 0;
    z-index: 10;
  }

  #header-left {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  #status-dot {
    display: inline-block;
    width: 7px; height: 7px;
    background: #3d8b3d;
    border-radius: 50%;
    flex-shrink: 0;
  }

  #header-title {
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
    letter-spacing: -0.01em;
  }

  #header-sub {
    font-size: 12px;
    color: var(--muted);
    font-weight: 400;
  }

  #header-sep {
    width: 1px;
    height: 14px;
    background: var(--border2);
  }

  #menu-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    cursor: pointer;
    width: 34px; height: 34px;
    border-radius: 8px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 4px;
    transition: border-color 0.15s, background 0.15s;
  }
  #menu-btn:hover { border-color: var(--border2); background: var(--bg3); color: var(--soft); }
  #menu-btn span {
    display: block;
    width: 14px;
    height: 1.5px;
    background: currentColor;
    border-radius: 1px;
  }

  #clear-chat-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    cursor: pointer;
    height: 34px;
    padding: 0 12px;
    border-radius: 8px;
    font-size: 12px;
    font-weight: 500;
    transition: all 0.15s;
    margin-right: 8px;
  }
  #clear-chat-btn:hover {
    border-color: var(--border2);
    background: var(--bg3);
    color: var(--soft);
  }

  /* ── Drawer ── */
  #drawer {
    position: fixed;
    top: 0; right: 0;
    width: min(320px, 90vw);
    height: 100dvh;
    background: var(--bg2);
    border-left: 1px solid var(--border);
    z-index: 100;
    transform: translateX(100%);
    transition: transform 0.22s cubic-bezier(0.4, 0, 0.2, 1);
    display: flex;
    flex-direction: column;
  }
  #drawer.open { transform: translateX(0); }

  #drawer-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 99;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.22s;
  }
  #drawer-overlay.show { opacity: 1; pointer-events: all; }

  #drawer-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 16px;
    height: 56px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  #drawer-header-title {
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
  }

  #drawer-close {
    background: none; border: none;
    color: var(--muted); cursor: pointer;
    width: 28px; height: 28px;
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; line-height: 1;
    transition: background 0.15s, color 0.15s;
  }
  #drawer-close:hover { background: var(--bg3); color: var(--text); }

  /* ── Drawer tabs ── */
  #drawer-tabs {
    display: flex;
    padding: 8px 12px 0;
    gap: 2px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    flex-wrap: wrap;
  }
  .drawer-tab {
    flex: 1;
    min-width: 0;
    background: none; border: none;
    padding: 6px 6px 8px;
    font-family: var(--sans);
    font-size: 11px;
    font-weight: 500;
    color: var(--muted);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: color 0.15s, border-color 0.15s;
    margin-bottom: -1px;
    white-space: nowrap;
  }
  .drawer-tab.active { color: var(--text); border-bottom-color: var(--text); }
  .drawer-tab:hover:not(.active) { color: var(--soft); }

  #drawer-content {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    font-family: var(--mono);
    font-size: 12px;
    line-height: 1.7;
    color: var(--soft);
    white-space: pre-wrap;
    word-break: break-word;
  }
  #drawer-content::-webkit-scrollbar { width: 4px; }
  #drawer-content::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

  /* ── Library tree ── */
  .tree-cat { margin-bottom: 2px; }
  .tree-cat-header {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 6px 8px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 12px;
    font-weight: 500;
    color: var(--muted);
    user-select: none;
    transition: background 0.12s, color 0.12s;
  }
  .tree-cat-header:hover { background: var(--bg3); color: var(--text); }
  .tree-arrow {
    display: inline-block;
    font-size: 9px;
    transition: transform 0.18s;
    color: var(--muted);
    width: 10px;
    text-align: center;
    font-family: var(--mono);
  }
  .tree-cat.open .tree-arrow { transform: rotate(90deg); }
  .tree-files { display: none; padding-left: 18px; margin-top: 1px; }
  .tree-cat.open .tree-files { display: block; }
  .tree-file {
    display: block;
    width: 100%;
    background: none; border: none;
    text-align: left;
    padding: 5px 8px;
    font-family: var(--mono);
    font-size: 11.5px;
    color: var(--muted);
    cursor: pointer;
    border-radius: 5px;
    transition: background 0.12s, color 0.12s;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .tree-file:hover { background: var(--bg3); color: var(--text); }
  .tree-file.active { background: var(--bg4); color: var(--text); }
  .tree-empty { color: var(--border2); font-size: 11px; padding: 4px 8px; font-family: var(--mono); }
  #tree-file-view { margin-top: 12px; border-top: 1px solid var(--border); padding-top: 12px; }

  /* ── People Network in library drawer (basic organization) ── */
  .people-net { font-size: 11px; }
  .people-net-node {
    display: inline-block;
    padding: 2px 6px;
    border: 1px solid var(--border);
    border-radius: 3px;
    margin: 2px;
    cursor: pointer;
    font-size: 10px;
    background: var(--bg2);
  }
  .people-net-node:hover { background: var(--bg3); }

  /* ── Memory entries (V2 grafted into V1 drawer style) ── */
  .memory-entry {
    font-size: 11.5px;
    line-height: 1.65;
    color: var(--muted);
    padding: 8px 0;
    border-bottom: 1px solid var(--border);
    white-space: pre-wrap;
    word-break: break-word;
  }
  .memory-entry:last-child { border-bottom: none; }
  .memory-entry.sage-entry { color: var(--soft); font-style: italic; }

  .drawer-section-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--accent-dim);
    margin-bottom: 8px;
    margin-top: 14px;
  }
  .drawer-section-label:first-child { margin-top: 0; }

  .status-row {
    display: flex;
    justify-content: space-between;
    padding: 5px 0;
    border-bottom: 1px solid var(--border);
    font-size: 11px;
  }
  .status-key { color: var(--muted); }
  .status-val { color: var(--soft); }
  .status-ok  { color: #3d8b3d; }
  .status-warn { color: #b08030; }
  .status-err  { color: #b04545; }

  /* ── Admin tab ── */
  .health-card {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 6px 8px;
    border-radius: 5px;
    font-size: 11px;
    margin-bottom: 4px;
  }
  .health-card.ok { background: #1a2e1a; color: #3d8b3d; }
  .health-card.warn { background: #2e281a; color: #b08030; }
  .health-card.err { background: #2e1a1a; color: #b04545; }
  .health-name { font-weight: 500; }
  .health-meta { font-size: 10px; opacity: 0.7; }

  .metric-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
    margin-bottom: 10px;
  }
  .metric-cell {
    padding: 8px;
    border-radius: 5px;
    background: var(--bg3);
    text-align: center;
  }
  .metric-val {
    font-size: 16px;
    font-weight: 600;
    color: var(--text);
  }
  .metric-label {
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--muted);
    margin-top: 2px;
  }

  .cycle-table {
    width: 100%;
    font-size: 10px;
    border-collapse: collapse;
    margin-bottom: 10px;
  }
  .cycle-table th {
    text-align: left;
    padding: 4px 6px;
    color: var(--muted);
    font-weight: 500;
    border-bottom: 1px solid var(--border);
  }
  .cycle-table td {
    padding: 3px 6px;
    color: var(--soft);
    border-bottom: 1px solid var(--border);
  }
  .cycle-table .cycle-err { color: #b04545; }

  .error-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 4px 6px;
    margin-bottom: 2px;
    font-size: 10px;
  }
  .error-name { flex: 1; color: var(--muted); }
  .error-count { color: #b04545; font-weight: 600; }
  .error-bar-inner {
    height: 4px;
    border-radius: 2px;
    background: #3d1a1a;
    flex: 0 0 80px;
    overflow: hidden;
  }
  .error-bar-fill {
    height: 100%;
    background: #b04545;
    border-radius: 2px;
  }

  #admin-log-viewer {
    width: 100%;
    max-height: 300px;
    overflow-y: auto;
    font-family: var(--mono);
    font-size: 10px;
    line-height: 1.5;
    background: var(--bg2);
    border-radius: 5px;
    padding: 8px;
    color: var(--muted);
    white-space: pre-wrap;
    word-break: break-all;
  }
  #admin-log-viewer::-webkit-scrollbar { width: 3px; }
  #admin-log-viewer::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
  .log-subsystem-daemon { color: #5b7baa; }
  .log-subsystem-cognition { color: #7b886b; }
  .log-subsystem-search { color: #6baa5b; }
  .log-event-error { color: #b04545; font-weight: 600; }
  .log-event-warn { color: #b08030; }

  .log-controls {
    display: flex;
    gap: 6px;
    margin-bottom: 6px;
    align-items: center;
  }
  .btn-log {
    background: var(--bg3);
    border: 1px solid var(--border);
    color: var(--soft);
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 10px;
    cursor: pointer;
    font-family: var(--sans);
  }
  .btn-log:hover { background: var(--bg4); color: var(--text); }
  .btn-log.active { background: var(--accent-dim); border-color: var(--accent); color: var(--text); }

  .admin-tab { position: relative; }
  .admin-badge {
    position: absolute;
    top: 4px; right: 4px;
    width: 7px; height: 7px;
    border-radius: 50%;
    background: transparent;
  }
  .admin-badge.warn { background: #b08030; }
  .admin-badge.err  { background: #b04545; }

  .admin-warn-banner {
    padding: 6px 10px;
    margin-bottom: 10px;
    border-radius: 5px;
    font-size: 10px;
    background: #2e281a;
    color: #b08030;
  }
  .admin-warn-banner.err { background: #2e1a1a; color: #b04545; }

  /* ── Messages ── */
  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 24px 16px;
    display: flex;
    flex-direction: column;
    gap: 4px;
    scroll-behavior: smooth;
  }
  #messages::-webkit-scrollbar { width: 4px; }
  #messages::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

  .msg-group {
    display: flex;
    flex-direction: column;
    gap: 2px;
    animation: fadeUp 0.18s ease;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .msg-label {
    font-size: 11px;
    font-weight: 500;
    padding: 0 4px;
    margin-bottom: 2px;
    color: var(--muted);
  }
  .msg-label.user { text-align: right; }
  .msg-label.ai   { text-align: left; }

  .bubble {
    padding: 10px 14px;
    border-radius: var(--radius);
    max-width: 82%;
    word-break: break-word;
    font-size: 14px;
    line-height: 1.65;
    position: relative;
  }
  .bubble.user {
    background: var(--bg3);
    border: 1px solid var(--border2);
    margin-left: auto;
    color: var(--text);
    border-bottom-right-radius: 3px;
  }
  .bubble.ai {
    background: var(--ai-bg);
    border: 1px solid var(--border);
    margin-right: auto;
    color: var(--text);
    border-bottom-left-radius: 3px;
  }

  .bubble code {
    font-family: var(--mono);
    font-size: 12px;
    background: var(--bg3);
    border: 1px solid var(--border);
    padding: 1px 5px;
    border-radius: 4px;
    color: var(--soft);
  }
  .bubble pre {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 14px;
    overflow-x: auto;
    margin: 8px 0;
    font-family: var(--mono);
    font-size: 12px;
    line-height: 1.6;
  }
  .bubble pre code { background: none; border: none; padding: 0; color: var(--soft); }
  .bubble strong { font-weight: 600; color: var(--text); }
  .bubble em { color: var(--soft); font-style: italic; }

  /* ── Thinking indicator ── */
  .thinking-indicator {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 14px;
    background: var(--ai-bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    border-bottom-left-radius: 3px;
    width: fit-content;
    margin-right: auto;
  }

  .thinking-dots {
    display: flex;
    gap: 4px;
    align-items: center;
    flex-shrink: 0;
  }

  .thinking-dots span {
    display: inline-block;
    width: 4px;
    height: 4px;
    background: var(--muted);
    border-radius: 50%;
    animation: thinkDot 1.6s ease-in-out infinite;
  }
  .thinking-dots span:nth-child(2) { animation-delay: 0.2s; }
  .thinking-dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes thinkDot {
    0%, 60%, 100% { opacity: 0.2; transform: translateY(0); }
    30%           { opacity: 0.9; transform: translateY(-3px); }
  }

  .thinking-label {
    font-size: 13px;
    color: var(--muted);
    font-family: var(--sans);
    animation: thinkPulse 2.4s ease-in-out infinite;
  }
  @keyframes thinkPulse {
    0%, 100% { opacity: 0.45; }
    50%       { opacity: 0.85; }
  }

  /* ── Searching indicator (distinct from thinking) ── */
  .searching-indicator {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 14px;
    background: var(--ai-bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    border-bottom-left-radius: 3px;
    width: fit-content;
    margin-right: auto;
  }

  .searching-orb {
    display: flex;
    gap: 3px;
    align-items: center;
    flex-shrink: 0;
  }

  .searching-orb span {
    display: inline-block;
    width: 5px;
    height: 5px;
    background: var(--soft);
    border-radius: 50%;
    animation: searchPulse 1.4s ease-in-out infinite;
    opacity: 0.3;
  }
  .searching-orb span:nth-child(1) { animation-delay: 0s; }
  .searching-orb span:nth-child(2) { animation-delay: 0.18s; }
  .searching-orb span:nth-child(3) { animation-delay: 0.36s; }
  .searching-orb span:nth-child(4) { animation-delay: 0.54s; }
  @keyframes searchPulse {
    0%, 100% { opacity: 0.15; transform: scaleY(0.6); }
    50%       { opacity: 0.8;  transform: scaleY(1.3); }
  }

  .searching-label {
    font-size: 12px;
    color: var(--soft);
    font-family: var(--mono);
    letter-spacing: 0.04em;
    animation: searchLabelPulse 2s ease-in-out infinite;
  }
  @keyframes searchLabelPulse {
    0%, 100% { opacity: 0.4; }
    50%       { opacity: 0.9; }
  }

  /* ── Input area ── */
  #input-area {
    padding: 12px 16px 16px;
    border-top: 1px solid var(--border);
    background: var(--bg);
    flex-shrink: 0;
  }

  /* Search context indicator — V2 feature, V1-styled */
  #search-context-bar {
    display: none;
    align-items: center;
    gap: 8px;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--soft);
    margin-bottom: 8px;
    padding: 0 2px;
  }
  #search-context-bar.active { display: flex; }
  #clear-search-btn {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 12px;
    padding: 0;
    line-height: 1;
    transition: color 0.15s;
    font-family: var(--mono);
  }
  #clear-search-btn:hover { color: var(--text); }

  #input-row {
    display: flex;
    gap: 8px;
    align-items: flex-end;
    background: var(--bg2);
    border: 1px solid var(--border2);
    border-radius: var(--radius);
    padding: 8px 8px 8px 14px;
    transition: border-color 0.15s;
  }
  #input-row:focus-within {
    border-color: var(--border2);
    box-shadow: 0 0 0 3px rgba(255,255,255,0.04);
  }

  #user-input {
    flex: 1;
    background: none;
    border: none;
    outline: none;
    color: var(--text);
    font-family: var(--sans);
    font-size: 14px;
    line-height: 1.55;
    resize: none;
    max-height: 160px;
    min-height: 22px;
    overflow-y: auto;
    padding: 2px 0;
  }
  #user-input::placeholder { color: var(--muted); }
  #user-input::-webkit-scrollbar { width: 3px; }
  #user-input::-webkit-scrollbar-thumb { background: var(--border); }

  #send-btn {
    background: var(--text);
    border: none;
    color: var(--bg);
    width: 34px; height: 34px;
    border-radius: 8px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: opacity 0.15s, transform 0.1s;
  }
  #send-btn:hover { opacity: 0.88; }
  #send-btn:active { transform: scale(0.93); }
  #send-btn:disabled { opacity: 0.25; cursor: not-allowed; }
  #send-btn svg { width: 15px; height: 15px; }

  #hint {
    margin-top: 7px;
    font-size: 11px;
    color: var(--accent-dim);
    text-align: center;
  }

  /* ── Empty state ── */
  #empty {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    gap: 10px;
    user-select: none;
  }
  #empty-glyph {
    width: 40px; height: 40px;
    border: 1.5px solid var(--border2);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    color: var(--muted);
    font-size: 18px;
  }
  #empty-title { font-size: 15px; font-weight: 500; color: var(--soft); }
  #empty-sub   { font-size: 12px; color: var(--muted); }

  /* ── Directive editor (V2 func, V1 style) ── */
  .editor-wrap { display: flex; flex-direction: column; gap: 8px; height: 100%; }
  .editor-textarea {
    flex: 1;
    background: var(--bg2);
    border: 1px solid var(--border2);
    border-radius: 8px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 12px;
    line-height: 1.6;
    padding: 10px 12px;
    resize: none;
    outline: none;
    min-height: 120px;
  }
  .editor-textarea:focus { border-color: var(--soft); }
  .editor-actions { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
  .btn-save {
    background: var(--text); color: var(--bg);
    border: none; border-radius: 6px;
    padding: 5px 14px; font-size: 12px; font-weight: 600;
    cursor: pointer; transition: opacity 0.15s;
  }
  .btn-save:hover { opacity: 0.82; }
  .btn-save:disabled { opacity: 0.3; cursor: not-allowed; }
  .editor-status { font-size: 11px; color: var(--muted); min-height: 16px; }
  .editor-status.ok  { color: #3d8b3d; }
  .editor-status.err { color: #c0392b; }

  /* ── Library new-entity form ── */
  .new-entity-form { display: flex; gap: 6px; margin-bottom: 8px; flex-wrap: wrap; }
  .new-entity-form select,
  .new-entity-form input {
    background: var(--bg2); border: 1px solid var(--border2);
    border-radius: 6px; color: var(--text);
    font-size: 12px; padding: 4px 8px; outline: none;
  }
  .new-entity-form select { flex-shrink: 0; }
  .new-entity-form input  { flex: 1; min-width: 80px; }
  .btn-new {
    background: none; color: var(--soft);
    border: 1px solid var(--border2); border-radius: 6px;
    padding: 4px 10px; font-size: 12px; cursor: pointer;
  }
  .btn-new:hover { border-color: var(--soft); }

  /* ── Responsive ── */
  @media (max-width: 600px) {
    #header { padding: 0 12px; }
    #messages { padding: 16px 12px; }
    #input-area { padding: 10px 12px 14px; }
    .bubble { max-width: 92%; }
    #drawer { width: min(300px, 92vw); }
  }
</style>

<body>
<div id="app">

        <button id="drawer-close" onclick="closeDrawer()">✕</button>

    <div id="drawer-tabs">

      <button class="drawer-tab" data-tab="inner" onclick="switchTab('inner')">Inner</button>

  <div id="messages">

    </div>

    <div id="input-row">
      <textarea id="user-input" placeholder="type..." rows="1"
        oninput="autoResize(this)"></textarea>
      <button id="send-btn" onclick="sendMessage()" title="Send">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"></line>
          <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
        </svg>
      </button>
    </div>
  </div>

</div>

<script>
/* ══════════════════════════════════════════════════════════════════
   Sage — Phase 2C Frontend
   Foundation: V1 structure, interaction philosophy, DOM flow
   Grafted:    V2 directive, memory panes, /search, polling, APIs
   ══════════════════════════════════════════════════════════════════ */

// ── State ──────────────────────────────────────────────────────────
let isStreaming   = false;
let currentTab    = 'directive';
let _searchContext = '';    // V2: search context block from /search command
let _currentJid   = null;
let _pollOffset   = 0;

// ── DOM refs ───────────────────────────────────────────────────────
const searchBar   = document.getElementById('search-context-bar');
const searchLabel = document.getElementById('search-context-label');
const clearSearch = document.getElementById('clear-search-btn');

clearSearch.addEventListener('click', () => {
  _searchContext = '';
  searchBar.classList.remove('active');
  searchLabel.textContent = '⚬ search context loaded';
});

// ── Markdown renderer (V1) ─────────────────────────────────────────
function renderMarkdown(text) {
  let s = text
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  s = s.replace(/```[\w]*\n([\s\S]*?)```/g, (_, code) =>
    `<pre><code>${code.trimEnd()}</code></pre>`);
  s = s.replace(/`([^`]+)`/g, '<code>$1</code>');
  s = s.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  s = s.replace(/\*(.+?)\*/g, '<em>$1</em>');
  s = s.replace(/\n/g, '<br>');
  return s;
}

// ── History load (V1 API) ──────────────────────────────────────────
async function loadHistory() {
  try {
    const r = await fetch('/api/history');
    const data = await r.json();
    const msgs = data.messages || [];
    if (msgs.length === 0) return;
    hideEmpty();
    msgs.forEach((m, i) => {
      const grpId = m.role === 'user' ? 'hist-u-' + i : null;
      appendBubble(m.role, m.content, false, grpId);
      if (m.role === 'user' && i === msgs.length - 1) addRetryBtn('hist-u-' + i, m.content);
    });
    scrollBottom();
  } catch(e) { console.error('Failed to load history', e); }
}

// ── Polling (V2 API signature: frm param) ─────────────────────────
async function pollJob(jid, aiGroupId, typingId) {
  _currentJid  = jid;
  _pollOffset  = 0;
  let bubbleEl = document.getElementById(aiGroupId + '-bubble');
  let full     = '';
  let typingShown = !!document.getElementById(typingId);

  return new Promise((resolve) => {
    const tick = async () => {
      try {
        const r = await fetch(`/api/poll/${jid}?frm=${_pollOffset}`);

        if (r.status === 404) {
          if (typingId && document.getElementById(typingId)) removeTyping(typingId);
          sessionStorage.removeItem('active_job');
          resolve(full);
          return;
        }

        const d = await r.json();

        if (d.status === 'thinking' || (!d.text && !d.done)) {
          if (!typingShown && !document.getElementById(typingId)) {
            appendTyping(typingId);
            typingShown = true;
          }
        }

        if (d.text || d.done) {
          if (typingId && document.getElementById(typingId)) {
            removeTyping(typingId);
            typingId = null;
          }
          if (!bubbleEl) bubbleEl = createAiBubble(aiGroupId);
        }

        if (d.text) {
          full += d.text;
          _pollOffset += (d.new_count || d.text.length);
          bubbleEl.innerHTML = renderMarkdown(full);
          scrollBottom();
        }

        if (!d.done) {
          setTimeout(tick, 200);
        } else {
          sessionStorage.removeItem('active_job');
          if (d.error && bubbleEl) bubbleEl.innerHTML += `<em style="color:#f85149"> [${d.error}]</em>`;
          resolve(full);
        }
      } catch(e) { setTimeout(tick, 1000); }
    };
    tick();
  });
}

// ── Send message ───────────────────────────────────────────────────
// V2 invariant: /search inside normal input, no visible search bar
async function sendMessage() {
  if (isStreaming) return;
  const input = document.getElementById('user-input');
  const text = input.value.trim();
  if (!text) return;

  // /search command — show visible user message, then conversational search flow
  if (text.startsWith('/search ')) {
    const query = text.slice(8).trim();
    if (query) {
      input.value = '';
      autoResize(input);
      hideEmpty();
      appendBubble('user', text, true);
      scrollBottom();
      await runSearch(query);
    }
    return;
  }

  input.value = '';
  autoResize(input);
  hideEmpty();

  const userGrpId = 'user-' + Date.now();
  appendBubble('user', text, true, userGrpId);
  scrollBottom();

  const typingId  = 'typing-' + Date.now();
  appendTyping(typingId);
  scrollBottom();

  isStreaming = true;
  setSendDisabled(true);

  const aiGroupId = 'ai-' + Date.now();

  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        message: text,
        search_context: _searchContext || undefined,
      }),
    });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    // V2 backend returns {jid} (not {job_id})
    const jid = data.jid || data.job_id;
    sessionStorage.setItem('active_job', jid);

    // Clear search context after send (V2 behavior)
    if (_searchContext) {
      _searchContext = '';
      searchBar.classList.remove('active');
    }

    await pollJob(jid, aiGroupId, typingId);
  } catch(e) {
    if (document.getElementById(typingId)) removeTyping(typingId);
    const bubbleEl = createAiBubble(aiGroupId);
    showError(bubbleEl, e.message);
    addRetryBtn(userGrpId, text);
  } finally {
    isStreaming = false;
    setSendDisabled(false);
    document.getElementById('user-input').focus();
    scrollBottom();
  }
}

// ── /search — conversational search with visible state ─────────────
async function runSearch(query) {
  if (!query) return;

  // Show "searching the web…" animated indicator
  const searchingId = 'searching-' + Date.now();
  appendSearching(searchingId);
  scrollBottom();

  isStreaming = true;
  setSendDisabled(true);

  try {
    const resp = await fetch('/api/search', {
      method:  'POST',
      headers: {'Content-Type': 'application/json'},
      body:    JSON.stringify({ query }),
    });
    const data = await resp.json();

    // Remove the searching indicator
    const searchingEl = document.getElementById(searchingId);
    if (searchingEl) searchingEl.remove();

    // Store context for grounding (PRESERVED — critical invariant)
    if (data.context_block) {
      _searchContext = data.context_block;
    }

    // Build conversational assistant reply
    let replyText = '';
    if (data.success && data.summary) {
      replyText = data.summary;
    } else if (data.result_count === 0) {
      replyText = `I searched for **"${query}"** but didn't find any relevant results.`;
    } else {
      replyText = `I searched for **"${query}"** — ${data.result_count || 0} results found. I've loaded this as context for our conversation.`;
    }

    // Append assistant bubble with the search summary
    appendBubble('ai', replyText, true);

    // Update (but don't prominently surface) the context bar — subtle indicator
    if (data.context_block) {
      searchBar.classList.add('active');
      searchLabel.textContent = `⚬ "${query}" — ${data.result_count || '?'} results`;
    }

    scrollBottom();

  } catch(err) {
    const searchingEl = document.getElementById(searchingId);
    if (searchingEl) searchingEl.remove();
    appendBubble('ai', `Search failed — ${err.message}`, true);
    scrollBottom();
  } finally {
    isStreaming = false;
    setSendDisabled(false);
    document.getElementById('user-input').focus();
  }
}

// ── Retry ──────────────────────────────────────────────────────────
async function retryMessage() {
  if (isStreaming) return;
  isStreaming = true;
  setSendDisabled(true);
  const typId  = 'retry-t-' + Date.now();
  const aGrp   = 'ai-retry-' + Date.now();
  appendTyping(typId);
  try {
    const res = await fetch('/api/retry', {method:'POST'});
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    const jid  = data.jid || data.job_id;
    sessionStorage.setItem('active_job', jid);
    await pollJob(jid, aGrp, typId);
  } catch(e) {
    if (document.getElementById(typId)) removeTyping(typId);
    const bubbleEl = createAiBubble(aGrp);
    showError(bubbleEl, e.message);
  } finally {
    isStreaming = false;
    setSendDisabled(false);
    scrollBottom();
  }
}

// ── Resume active job on page load ────────────────────────────────
async function resumeActiveJob() {
  const jid = sessionStorage.getItem('active_job');
  if (!jid) return;
  setSendDisabled(true);
  const aGrp = 'resume-' + Date.now();
  const typId = 'resume-t-' + Date.now();
  await pollJob(jid, aGrp, typId);
  setSendDisabled(false);
}

// ── DOM helpers (V1 style) ─────────────────────────────────────────
function hideEmpty() {
  const el = document.getElementById('empty');
  if (el) el.style.display = 'none';
}

function appendBubble(role, content, animate = true, groupId = null) {
  const container = document.getElementById('messages');
  const group = document.createElement('div');
  group.className = 'msg-group';
  if (groupId) group.id = groupId;
  if (!animate) group.style.animation = 'none';

  const label = document.createElement('div');
  label.className = `msg-label ${role === 'user' ? 'user' : 'ai'}`;
  label.textContent = role === 'user' ? 'you' : 'Sage';

  const bubble = document.createElement('div');
  bubble.className = `bubble ${role === 'user' ? 'user' : 'ai'}`;
  bubble.innerHTML = renderMarkdown(content);

  group.appendChild(label);
  group.appendChild(bubble);
  container.appendChild(group);
  return bubble;
}

function addRetryBtn(userGroupId, originalText) {
  const group = document.getElementById(userGroupId);
  if (!group || group.querySelector('.retry-btn')) return;
  const btn = document.createElement('button');
  btn.className = 'retry-btn';
  btn.textContent = '↺ retry';
  btn.style.cssText = 'display:block;margin-top:6px;margin-left:auto;background:none;border:1px solid #444;color:#737373;padding:3px 10px;border-radius:6px;cursor:pointer;font-size:10px;font-family:monospace;letter-spacing:.05em;';
  btn.onclick = () => {
    btn.remove();
    retryMessage();
  };
  group.appendChild(btn);
}

function createAiBubble(id) {
  const container = document.getElementById('messages');
  const group = document.createElement('div');
  group.className = 'msg-group';
  group.id = id;

  const label = document.createElement('div');
  label.className = 'msg-label ai';
  label.textContent = 'Sage';

  const bubble = document.createElement('div');
  bubble.className = 'bubble ai';
  bubble.id = id + '-bubble';

  group.appendChild(label);
  group.appendChild(bubble);
  container.appendChild(group);
  return bubble;
}

function appendTyping(id) {
  const container = document.getElementById('messages');
  const group = document.createElement('div');
  group.className = 'msg-group';
  group.id = id;

  const label = document.createElement('div');
  label.className = 'msg-label ai';
  label.textContent = 'Sage';

  const indicator = document.createElement('div');
  indicator.className = 'thinking-indicator';

  const dots = document.createElement('div');
  dots.className = 'thinking-dots';
  dots.innerHTML = '<span></span><span></span><span></span>';

  const lbl = document.createElement('span');
  lbl.className = 'thinking-label';
  lbl.textContent = 'Thinking…';

  indicator.appendChild(dots);
  indicator.appendChild(lbl);
  group.appendChild(label);
  group.appendChild(indicator);
  container.appendChild(group);
  scrollBottom();
}

function removeTyping(id) {
  const el = document.getElementById(id);
  if (el) el.remove();
}

function appendSearching(id) {
  const container = document.getElementById('messages');
  const group = document.createElement('div');
  group.className = 'msg-group';
  group.id = id;

  const label = document.createElement('div');
  label.className = 'msg-label ai';
  label.textContent = 'Sage';

  const indicator = document.createElement('div');
  indicator.className = 'searching-indicator';

  const orb = document.createElement('div');
  orb.className = 'searching-orb';
  orb.innerHTML = '<span></span><span></span><span></span><span></span>';

  const lbl = document.createElement('span');
  lbl.className = 'searching-label';
  lbl.textContent = 'searching the web…';

  indicator.appendChild(orb);
  indicator.appendChild(lbl);
  group.appendChild(label);
  group.appendChild(indicator);
  container.appendChild(group);
  scrollBottom();
}

function scrollBottom() {
  const el = document.getElementById('messages');
  el.scrollTop = el.scrollHeight;
}

function setSendDisabled(v) {
  document.getElementById('send-btn').disabled = v;
}

function showError(bubbleEl, msg) {
  bubbleEl.innerHTML = `<em style="color:#777">error — ${msg}</em>`;
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 160) + 'px';
}

// ── Keyboard handler ───────────────────────────────────────────────
document.getElementById('user-input').addEventListener('keydown', e => {
  if (e.key === 'Enter' && e.ctrlKey) {
    e.preventDefault();
    if (!isStreaming) sendMessage();
  }
});

// ── Clear Chat ─────────────────────────────────────────────────────
async function clearChat() {
  if (!confirm('Archive current chat and start fresh?\n\nMemory is NOT affected — only the visible chat history will be cleared.')) {
    return;
  }

  try {
    const res = await fetch('/api/history/archive', { method: 'POST' });
    const data = await res.json();

    if (data.ok) {
      // Clear UI
      const msgs = document.getElementById('messages');
      msgs.innerHTML = '<div id="empty"><div id="empty-glyph">◇</div><div id="empty-title">No messages yet</div><div id="empty-sub">Start a conversation below</div></div>';

      // Show confirmation
      const archived = data.archived_to ? ` (archived ${data.message_count} messages to ${data.archived_to})` : '';
      console.log(`Chat cleared${archived}`);
    } else {
      alert('Failed to clear chat');
    }
  } catch (err) {
    console.error('Clear chat error:', err);
    alert('Error clearing chat: ' + err.message);
  }
}

// ── Drawer (V1 structure) ──────────────────────────────────────────
function toggleDrawer() {
  const d = document.getElementById('drawer');
  if (d.classList.contains('open')) closeDrawer();
  else openDrawer();
}

function openDrawer() {
  document.getElementById('drawer').classList.add('open');
  document.getElementById('drawer-overlay').classList.add('show');
  loadTab(currentTab);
}

function closeDrawer() {
  document.getElementById('drawer').classList.remove('open');
  document.getElementById('drawer-overlay').classList.remove('show');
}

function switchTab(tab) {
  currentTab = tab;
  // Clean up admin poll timers and mark tab inactive
  if (tab !== 'admin') {
    _adminTabActive = false;
    if (_adminPollTimer) { clearInterval(_adminPollTimer); _adminPollTimer = null; }
    if (_logPollTimer) { clearInterval(_logPollTimer); _logPollTimer = null; }
    _adminEl = null;
  }
  document.querySelectorAll('.drawer-tab').forEach(t => {
    t.classList.toggle('active', t.dataset.tab === tab);
  });
  loadTab(tab);
}

// ── Tab content loaders ────────────────────────────────────────────
async function loadTab(tab) {
  const el = document.getElementById('drawer-content');

  if (tab === 'directive') {
    await loadDirectiveTab(el);
  } else if (tab === 'library') {
    el.style.whiteSpace = 'normal';
    el.innerHTML = 'Loading…';
    await loadLibraryTree(el);
  } else if (tab === 'memory') {
    el.style.whiteSpace = 'normal';
    el.innerHTML = 'Loading…';
    await loadMemoryTab(el);
  } else if (tab === 'inner') {
    el.style.whiteSpace = 'normal';
    el.innerHTML = 'Loading…';
    await loadInnerTab(el);
  } else if (tab === 'admin') {
    el.style.whiteSpace = 'normal';
    el.innerHTML = 'Loading…';
    await loadAdminTab(el);
  }
}

// ── Directive tab — V2 API (/api/directive GET/POST) ──────────────
async function loadDirectiveTab(el) {
  el.style.whiteSpace = 'normal';
  el.innerHTML = 'Loading…';
  try {
    const r = await fetch('/api/directive');
    const d = await r.json();
    el.innerHTML = '';

    const wrap = document.createElement('div');
    wrap.className = 'editor-wrap';

    const ta = document.createElement('textarea');
    ta.className = 'editor-textarea';
    ta.value = d.content || '';
    ta.style.flex = '1';

    const actions = document.createElement('div');
    actions.className = 'editor-actions';

    const status = document.createElement('div');
    status.className = 'editor-status';

    const saveBtn = document.createElement('button');
    saveBtn.className = 'btn-save';
    saveBtn.textContent = 'Save';
    saveBtn.onclick = async () => {
      saveBtn.disabled = true;
      status.textContent = 'Saving…'; status.className = 'editor-status';
      try {
        const res = await fetch('/api/directive', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({content: ta.value})
        });
        const j = await res.json();
        if (j.ok) { status.textContent = 'Saved.'; status.className = 'editor-status ok'; }
        else       { status.textContent = 'Error.'; status.className = 'editor-status err'; }
      } catch(e) {
        status.textContent = 'Failed.'; status.className = 'editor-status err';
      }
      saveBtn.disabled = false;
    };

    actions.appendChild(saveBtn);
    wrap.appendChild(ta);
    wrap.appendChild(actions);
    wrap.appendChild(status);
    el.appendChild(wrap);
  } catch(e) { el.textContent = 'Failed to load directive.'; }
}

// ── Library tab — V2 API (/api/library) ───────────────────────────
async function loadLibraryTree(el) {
  try {
    // V2 library API: /api/library returns {library: {cat: [names]}}
    // V1 library API: /api/library returns {people: [], places: [], topics: []}
    const r = await fetch('/api/library');
    const raw = await r.json();
    // Support both V1 and V2 response shapes
    const tree = raw.library || raw;
    el.innerHTML = '';

    const newForm = document.createElement('div');
    newForm.className = 'new-entity-form';

    const catSel = document.createElement('select');
    ['people','places','topics'].forEach(c => {
      const o = document.createElement('option');
      o.value = o.textContent = c;
      catSel.appendChild(o);
    });

    const nameIn = document.createElement('input');
    nameIn.placeholder = 'entity name…';
    nameIn.type = 'text';

    const newBtn = document.createElement('button');
    newBtn.className = 'btn-new';
    newBtn.textContent = '+ New';
    newBtn.onclick = async () => {
      const cat  = catSel.value;
      const name = nameIn.value.trim();
      if (!name) return;
      // Try V2 endpoint first, fallback to V1
      try {
        const res = await fetch('/api/library/file/new', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({cat, name})
        });
        const j = await res.json();
        if (j.ok || j.status === 'ok') { nameIn.value = ''; await loadLibraryTree(el); }
        else alert(j.error || 'Failed');
      } catch(e) { alert('Failed'); }
    };

    newForm.appendChild(catSel);
    newForm.appendChild(nameIn);
    newForm.appendChild(newBtn);
    el.appendChild(newForm);

    // Search filter for library tree (makes drawer more organized)
    const searchWrap = document.createElement('div');
    searchWrap.style.marginBottom = '6px';
    const searchIn = document.createElement('input');
    searchIn.placeholder = 'filter people / places / topics…';
    searchIn.style.cssText = 'width:100%; font-size:11px; padding:4px 6px; border:1px solid var(--border); border-radius:4px; background:var(--bg2); color:var(--text);';
    searchWrap.appendChild(searchIn);
    el.appendChild(searchWrap);

    const treeDiv = document.createElement('div');
    for (const [cat, files] of Object.entries(tree)) {
      if (!Array.isArray(files)) continue;
      const catDiv = document.createElement('div');
      catDiv.className = 'tree-cat';
      catDiv.dataset.cat = cat;

      const header = document.createElement('div');
      header.className = 'tree-cat-header';
      header.innerHTML = `<span class="tree-arrow">▶</span><span>${cat}</span><span style="margin-left:auto;color:var(--border2);font-size:9px">${files.length}</span>`;
      header.onclick = () => catDiv.classList.toggle('open');

      const filesDiv = document.createElement('div');
      filesDiv.className = 'tree-files';

      if (files.length === 0) {
        filesDiv.innerHTML = '<span class="tree-empty">empty</span>';
      } else {
        files.forEach(name => {
          const btn = document.createElement('button');
          btn.className = 'tree-file';
          btn.textContent = name;
          btn.dataset.name = name;
          btn.onclick = () => loadLibraryFile(cat, name, btn, el);
          filesDiv.appendChild(btn);
        });
      }

      catDiv.appendChild(header);
      catDiv.appendChild(filesDiv);
      treeDiv.appendChild(catDiv);
    }

    el.appendChild(treeDiv);

    // Filter logic for search input
    searchIn.oninput = () => {
      const q = searchIn.value.toLowerCase().trim();
      treeDiv.querySelectorAll('.tree-cat').forEach(catDiv => {
        const filesDiv = catDiv.querySelector('.tree-files');
        let hasMatch = false;
        filesDiv.querySelectorAll('.tree-file').forEach(btn => {
          const match = btn.textContent.toLowerCase().includes(q);
          btn.style.display = (q === '' || match) ? '' : 'none';
          if (match) hasMatch = true;
        });
        // show category if has matches or no query
        catDiv.style.display = (q === '' || hasMatch) ? '' : 'none';
      });
    };

    // People Network section (basic relational view for organization)
    // Parses notes client-side for mentions of other known people; expandable
    if (tree.people && tree.people.length > 0) {
      const netSection = document.createElement('div');
      netSection.style.cssText = 'margin-top:10px; padding-top:8px; border-top:1px solid var(--border2);';
      const netHeader = document.createElement('div');
      netHeader.style.cssText = 'font-size:11px; color:var(--muted); margin-bottom:4px; cursor:pointer; user-select:none;';
      netHeader.innerHTML = '👥 People Network <span style="font-size:9px;">(click to expand • basic co-mentions from notes)</span>';
      const netContent = document.createElement('div');
      netContent.style.display = 'none';
      netContent.style.fontSize = '11px';

      // Known people for simple relation scanning (expandable later)
      const knownPeople = tree.people;
      const nodesDiv = document.createElement('div');
      nodesDiv.style.cssText = 'display:flex; flex-wrap:wrap; gap:4px; margin:4px 0;';

      // Fetch and scan notes for connections (async but fire-and-forget for UI)
      (async () => {
        const connections = {};
        for (const p of knownPeople) {
          try {
            const r = await fetch(`/api/library/people/${encodeURIComponent(p)}`);
            if (r.ok) {
              const d = await r.json();
              const content = (d.content || '').toLowerCase();
              knownPeople.forEach(other => {
                if (other !== p && content.includes(other.toLowerCase().replace(/_/g, ' '))) {
                  if (!connections[p]) connections[p] = [];
                  if (!connections[p].includes(other)) connections[p].push(other);
                }
              });
            }
          } catch(e) {}
        }

        knownPeople.forEach(p => {
          const node = document.createElement('button');
          node.textContent = p;
          node.className = 'people-net-node';
          node.onclick = () => loadLibraryFile('people', p, node, el);
          nodesDiv.appendChild(node);
        });

        const connList = document.createElement('div');
        connList.style.cssText = 'color:var(--muted); font-size:10px; margin-top:4px;';
        if (Object.keys(connections).length > 0) {
          let html = 'Detected connections (from notes):<br>';
          Object.entries(connections).forEach(([p, cons]) => {
            html += `• ${p} → ${cons.join(', ')}<br>`;
          });
          connList.innerHTML = html;
        } else {
          connList.textContent = 'No explicit connections detected in current notes yet. (Add "band with naufal" style mentions to notes for auto-links.)';
        }

        // PHASE 4 #3: Use backend network API for richer relations (fallback to client scan)
        try {
          const netR = await fetch('/api/people/network');
          if (netR.ok) {
            const netD = await netR.json();
            const netPeople = netD.people_network || [];
            if (netPeople.length > 0) {
              const netList = document.createElement('div');
              netList.style.cssText = 'margin-top:4px; font-size:10px;';
              netPeople.forEach(p => {
                let relText = '';
                if (p.groups && p.groups.length) relText += `Groups: ${p.groups.join(', ')} `;
                if (p.related && p.related.length) relText += `Related: ${p.related.join(', ')}`;
                if (relText) {
                  const relDiv = document.createElement('div');
                  relDiv.textContent = `${p.name}: ${relText}`;
                  netList.appendChild(relDiv);
                }
              });
              if (netList.children.length) netContent.appendChild(netList);
            }
          }
        } catch(e) {
          // fallback to previous client scan
        }

        // Demo group detection (scan notes for common group words)
        const groupWords = ['band', 'group', 'team', 'crew', 'classmates'];
        let groupsFound = [];
        // Re-scan for groups (simple)
        for (const p of knownPeople) {
          try {
            const r = await fetch(`/api/library/people/${encodeURIComponent(p)}`);
            if (r.ok) {
              const d = await r.json();
              const content = (d.content || '').toLowerCase();
              groupWords.forEach(gw => {
                if (content.includes(gw)) {
                  if (!groupsFound.includes(gw)) groupsFound.push(gw);
                }
              });
            }
          } catch(e) {}
        }
        if (groupsFound.length > 0) {
          const gDiv = document.createElement('div');
          gDiv.style.cssText = 'margin-top:4px; color:var(--accent, #4a9); font-size:10px;';
          gDiv.textContent = `Groups hinted: ${groupsFound.join(', ')} (e.g. "My band")`;
          netContent.appendChild(gDiv);
        }
        netContent.appendChild(nodesDiv);
        netContent.appendChild(connList);
      })();

      netHeader.onclick = () => {
        netContent.style.display = netContent.style.display === 'none' ? 'block' : 'none';
      };
      netSection.appendChild(netHeader);
      netSection.appendChild(netContent);
      el.appendChild(netSection);
    }

    const viewer = document.createElement('div');
    viewer.id = 'tree-file-view';
    viewer.style.display = 'none';
    el.appendChild(viewer);

  } catch(e) { el.textContent = 'Failed to load library.'; }
}

async function loadLibraryFile(cat, name, btn, treeEl) {
  document.querySelectorAll('.tree-file').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');

  let viewer = document.getElementById('tree-file-view');
  if (!viewer) {
    viewer = document.createElement('div');
    viewer.id = 'tree-file-view';
    treeEl.appendChild(viewer);
  }
  viewer.style.display = 'block';
  viewer.innerHTML = 'Loading…';

  try {
    // Try V2 endpoint: /api/library/{cat}/{name}
    let d;
    try {
      const r2 = await fetch(`/api/library/${encodeURIComponent(cat)}/${encodeURIComponent(name)}`);
      if (r2.ok) { d = await r2.json(); }
    } catch(e2) {}
    // Fallback V1: /api/library/file?cat=...&name=...
    if (!d) {
      const r1 = await fetch(`/api/library/file?cat=${encodeURIComponent(cat)}&name=${encodeURIComponent(name)}`);
      d = await r1.json();
    }

    viewer.innerHTML = '';

    const label = document.createElement('div');
    label.style.cssText = 'font-size:11px;color:var(--muted);margin-bottom:6px;font-family:var(--mono)';
    label.textContent = `${cat} / ${name}`;

    const ta = document.createElement('textarea');
    ta.className = 'editor-textarea';
    ta.value = d.content || '';
    ta.rows = 8;

    const actions = document.createElement('div');
    actions.className = 'editor-actions';

    const status = document.createElement('div');
    status.className = 'editor-status';

    const saveBtn = document.createElement('button');
    saveBtn.className = 'btn-save';
    saveBtn.textContent = 'Save';
    saveBtn.onclick = async () => {
      saveBtn.disabled = true;
      status.textContent = 'Saving…'; status.className = 'editor-status';
      try {
        // Try V2 endpoint
        let ok = false;
        try {
          const res2 = await fetch(`/api/library/${encodeURIComponent(cat)}/${encodeURIComponent(name)}`, {
            method: 'PUT',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({content: ta.value})
          });
          if (res2.ok) { const j = await res2.json(); ok = j.ok || j.status === 'ok'; }
        } catch(e2) {}
        // Fallback V1
        if (!ok) {
          const res1 = await fetch('/api/library/file', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({cat, name, content: ta.value})
          });
          const j1 = await res1.json();
          ok = j1.ok;
        }
        if (ok) { status.textContent = 'Saved.'; status.className = 'editor-status ok'; }
        else    { status.textContent = 'Error.'; status.className = 'editor-status err'; }
      } catch(e) { status.textContent = 'Failed.'; status.className = 'editor-status err'; }
      saveBtn.disabled = false;
    };

    const delBtn = document.createElement('button');
    delBtn.style.cssText = 'background:none;color:#c0392b;border:1px solid #c0392b44;border-radius:6px;padding:5px 14px;font-size:12px;cursor:pointer;';
    delBtn.textContent = 'Delete';
    delBtn.onclick = async () => {
      if (!confirm(`Delete ${cat}/${name}?`)) return;
      try {
        // Try V2: DELETE /api/library/{cat}/{name}
        let ok = false;
        try {
          const res2 = await fetch(`/api/library/${encodeURIComponent(cat)}/${encodeURIComponent(name)}`, {method: 'DELETE'});
          if (res2.ok) ok = true;
        } catch(e2) {}
        // Fallback V1
        if (!ok) {
          const res1 = await fetch(`/api/library/file?cat=${encodeURIComponent(cat)}&name=${encodeURIComponent(name)}`, {method: 'DELETE'});
          if (res1.ok) ok = true;
        }
        if (ok) {
          viewer.style.display = 'none';
          viewer.innerHTML = '';
          if (treeEl) await loadLibraryTree(treeEl);
        }
      } catch(e) {}
    };

    actions.appendChild(saveBtn);
    actions.appendChild(delBtn);
    viewer.appendChild(label);
    viewer.appendChild(ta);
    viewer.appendChild(actions);
    viewer.appendChild(status);
  } catch(e) { viewer.textContent = 'Failed to load.'; }
}

// ── Admin tab ──────────────────────────────────────────────────────
let _adminPollTimer = null;
let _logPollTimer = null;
let _logPollPaused = false;
let _logFingerprint = null;
let _adminEl = null;
let _adminTabActive = false;

async function loadAdminTab(el) {
  _adminEl = el;
  _adminTabActive = true;
  await updateAdminMetrics(el);
  await loadAdminLogs(el);

  // Start poll timers (kill old ones first)
  if (_adminPollTimer) clearInterval(_adminPollTimer);
  if (_logPollTimer) clearInterval(_logPollTimer);
  _adminPollTimer = setInterval(() => {
    if (_adminTabActive) updateAdminMetrics(_adminEl);
  }, 15000);
  _logPollTimer = setInterval(() => {
    if (_adminTabActive && !_logPollPaused) loadAdminLogs(_adminEl);
  }, 3000);
}

async function updateAdminMetrics(el) {
  if (!el) el = _adminEl;
  if (!el) return;

  try {
    const [hRes, mRes, uRes, eRes, sRes, bRes] = await Promise.all([
      fetch('/api/admin/health').then(r => r.json()).catch(() => null),
      fetch('/api/admin/metrics').then(r => r.json()).catch(() => null),
      fetch('/api/admin/uptime').then(r => r.json()).catch(() => null),
      fetch('/api/admin/errors').then(r => r.json()).catch(() => null),
      fetch('/api/status').then(r => r.json()).catch(() => null),
      fetch('/api/search/budget').then(r => r.json()).catch(() => null),
    ]);

    el.innerHTML = '';

    // Warning banner
    if (uRes) {
      const daemonLast = mRes ? mRes.daemon_last_run : null;
      if (daemonLast) {
        const now = Date.now() / 1000;
        if (now - daemonLast > 1800) {
          const banner = document.createElement('div');
          banner.className = 'admin-warn-banner';
          banner.textContent = '⚠ Daemon last ran ' + formatUptime(now - daemonLast) + ' ago.';
          el.appendChild(banner);
        }
      }
    }

    // Section: Health
    const hl = document.createElement('div');
    hl.className = 'drawer-section-label';
    hl.textContent = 'Health';
    el.appendChild(hl);

    if (hRes && hRes.checks) {
      hRes.checks.forEach(c => {
        const card = document.createElement('div');
        card.className = 'health-card ' + (c.ok ? 'ok' : (c.error && c.name !== 'Filesystem' ? 'err' : 'warn'));
        card.innerHTML = `<span class="health-name">${escHtml(c.name)}</span><span class="health-meta">${c.latency_ms ? c.latency_ms + 'ms' : ''}</span>`;
        el.appendChild(card);
      });
    }

    // Section: Metrics
    const ml = document.createElement('div');
    ml.className = 'drawer-section-label';
    ml.textContent = 'Metrics';
    ml.style.marginTop = '12px';
    el.appendChild(ml);

    if (mRes) {
      const grid = document.createElement('div');
      grid.className = 'metric-grid';
      const totalErrs = (eRes && eRes.by_subsystem)
        ? Object.values(eRes.by_subsystem).reduce((a, b) => a + b, 0)
        : mRes.total_errors || 0;
      const cells = [
        ['Uptime', formatUptime(mRes.uptime_seconds || 0)],
        ['Requests', mRes.total_requests],
        ['Avg Latency', (mRes.avg_api_latency_ms || 0).toFixed(0) + 'ms'],
        ['Daemon Cycles', mRes.daemon_cycles_run],
        ['Sessions', (sRes && sRes.session_turns) ? sRes.session_turns : '--'],
        ['Total Errors', totalErrs],
        ['Search Budget', (bRes && bRes.remaining !== undefined) ? `${bRes.remaining} / ${bRes.max}` : '--'],
        ['Disk Free', (hRes && hRes.disk) ? hRes.disk.free_gb + ' GB' : '--'],
      ];
      cells.forEach(([label, val]) => {
        const cell = document.createElement('div');
        cell.className = 'metric-cell';
        cell.innerHTML = `<div class="metric-val">${val}</div><div class="metric-label">${label}</div>`;
        grid.appendChild(cell);
      });
      el.appendChild(grid);
    }

    // Section: Daemon history
    if (mRes && mRes.daemon_cycles_run > 0) {
      const dl = document.createElement('div');
      dl.className = 'drawer-section-label';
      dl.textContent = 'Daemon Cycles';
      el.appendChild(dl);

      const resp = await fetch('/api/admin/daemon/history');
      const hist = await resp.json();
      const cycles = (hist.cycles || []).slice(-8).reverse();

      const table = document.createElement('table');
      table.className = 'cycle-table';
      table.innerHTML = '<thead><tr><th>Time</th><th>Dur</th><th>Search</th><th>Ep</th><th>Themes</th><th>Refl</th></tr></thead>';
      const tbody = document.createElement('tbody');
      cycles.forEach(c => {
        const row = document.createElement('tr');
        if (c.error) row.className = 'cycle-err';
        const ts = new Date(c.ts * 1000).toISOString().slice(11, 19);
        row.innerHTML = `<td>${ts}</td><td>${(c.duration||0).toFixed(1)}s</td><td>${c.search_ran ? '✓' : '—'}</td><td>${c.episode_written ? '✓' : '—'}</td><td>${c.themes||0}</td><td>${c.sage_reflection ? '✓' : '—'}</td>`;
        tbody.appendChild(row);
      });
      table.appendChild(tbody);
      el.appendChild(table);
    }

    // Section: Errors
    if (eRes && eRes.by_subsystem) {
      const elbl = document.createElement('div');
      elbl.className = 'drawer-section-label';
      elbl.textContent = 'Errors';
      el.appendChild(elbl);

      const maxErr = Math.max(1, ...Object.values(eRes.by_subsystem));
      const entries = Object.entries(eRes.by_subsystem).sort((a, b) => b[1] - a[1]);
      entries.forEach(([subsys, count]) => {
        if (count === 0) return;
        const bar = document.createElement('div');
        bar.className = 'error-bar';
        bar.innerHTML = `<span class="error-name">${escHtml(subsys)}</span><span class="error-count">${count}</span><div class="error-bar-inner"><div class="error-bar-fill" style="width:${(count/maxErr*100).toFixed(0)}%"></div></div>`;
        el.appendChild(bar);
      });
      if (entries.every(([, c]) => c === 0)) {
        const p = document.createElement('div');
        p.style.cssText = 'color:var(--muted);font-size:10px;padding:4px 0;';
        p.textContent = 'No errors recorded.';
        el.appendChild(p);
      }
    }

    // Update badge
    const totalErrs = (eRes && eRes.by_subsystem)
      ? Object.values(eRes.by_subsystem).reduce((a, b) => a + b, 0)
      : 0;
    updateAdminBadge(totalErrs);

  } catch (e) {
    el.textContent = 'Failed to load admin metrics.';
  }
}

async function loadAdminLogs(el) {
  if (!el) el = _adminEl;
  if (!el) return;

  // Don't recreate log viewer if it exists
  let viewer = document.getElementById('admin-log-viewer');
  let controls = document.getElementById('log-controls');
  if (!viewer) {
    const lbl = document.createElement('div');
    lbl.className = 'drawer-section-label';
    lbl.textContent = 'Live Logs';
    lbl.style.marginTop = '12px';
    el.appendChild(lbl);

    controls = document.createElement('div');
    controls.id = 'log-controls';
    controls.className = 'log-controls';

    const pauseBtn = document.createElement('button');
    pauseBtn.className = 'btn-log';
    pauseBtn.textContent = 'Pause';
    pauseBtn.onclick = toggleLogPoll;

    const linesSel = document.createElement('select');
    linesSel.className = 'btn-log';
    [25, 50, 100, 200].forEach(n => {
      const o = document.createElement('option'); o.value = n; o.textContent = n + ' lines'; if (n === 100) o.selected = true;
      linesSel.appendChild(o);
    });
    linesSel.onchange = () => _logFingerprint = null;

    const subFilter = document.createElement('select');
    subFilter.className = 'btn-log';
    subFilter.id = 'log-filter';
    [
      ['all', 'All'],
      ['daemon', 'Daemon'], ['cognition', 'Cognition'], ['memory', 'Memory'],
      ['inference', 'Inference'], ['search', 'Search'], ['api', 'API'],
      ['bootstrap', 'Bootstrap'], ['event_bus', 'Event Bus']
    ].forEach(([val, label]) => {
      const o = document.createElement('option'); o.value = val; o.textContent = label;
      subFilter.appendChild(o);
    });
    subFilter.onchange = () => _logFingerprint = null;

    controls.appendChild(pauseBtn);
    controls.appendChild(linesSel);
    controls.appendChild(subFilter);
    el.appendChild(controls);

    viewer = document.createElement('pre');
    viewer.id = 'admin-log-viewer';
    el.appendChild(viewer);
  }

  const filterVal = document.getElementById('log-filter') ? document.getElementById('log-filter').value : 'all';
  const linesVal = document.getElementById('log-controls') ? document.getElementById('log-controls').querySelector('select').value : 50;

  try {
    const resp = await fetch(`/api/admin/logs/tail?lines=${linesVal}&since=${encodeURIComponent(_logFingerprint || '')}`);
    const data = await resp.json();
    if (!data.lines) return;

    if (data.unchanged) return;

    _logFingerprint = data.fingerprint || null;

    let filtered = data.lines;
    if (filterVal !== 'all') {
      filtered = filtered.filter(l => l.subsystem === filterVal);
    }

    const html = filtered.map(l => {
      let css = 'log-subsystem-' + (l.subsystem || 'unknown');
      if (l.event && l.event.includes('error')) css += ' log-event-error';
      if (l.event && l.event.includes('warn')) css += ' log-event-warn';
      const ts = (l.ts || '').slice(11, 19) || '--:--:--';
      let line = ts + ' [' + l.subsystem + '/' + l.event + ']';
      const extra = Object.entries(l).filter(([k]) => !['ts', 'subsystem', 'event'].includes(k));
      if (extra.length) line += ' ' + extra.map(([k, v]) => k + '=' + JSON.stringify(v)).join(' ');
      return '<span class="' + css + '">' + escHtml(line) + '</span>';
    }).join('\n');

    viewer.innerHTML = html;
    viewer.scrollTop = viewer.scrollHeight;
  } catch (e) {
    viewer.textContent = 'Failed to load logs.';
  }
}

function toggleLogPoll() {
  _logPollPaused = !_logPollPaused;
  const btn = document.querySelector('#log-controls .btn-log');
  if (btn) { btn.textContent = _logPollPaused ? 'Resume' : 'Pause'; btn.classList.toggle('active', _logPollPaused); }
}

function updateAdminBadge(totalErrors) {
  const tab = document.querySelector('.admin-tab');
  if (!tab) return;
  let badge = tab.querySelector('.admin-badge');
  if (!badge) {
    badge = document.createElement('span');
    badge.className = 'admin-badge';
    tab.appendChild(badge);
  }
  badge.className = 'admin-badge';
  if (totalErrors > 0) badge.classList.add('err');
}

function escHtml(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function formatUptime(seconds) {
  seconds = Math.round(seconds);
  const h = Math.floor(seconds / 3600);
  const m = Math.floor((seconds % 3600) / 60);
  const s = seconds % 60;
  if (h > 24) {
    const d = Math.floor(h / 24);
    return d + 'd ' + (h % 24) + 'h';
  }
  if (h > 0) return h + 'h ' + m + 'm';
  if (m > 0) return m + 'm ' + s + 's';
  return s + 's';
}

loadHistory();
resumeActiveJob();
document.getElementById('user-input').focus();
