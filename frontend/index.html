<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sage</title>
  <style>
    /* ── Reset ──────────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0e0e0e;
      --surface:   #141414;
      --border:    #222222;
      --muted:     #333333;
      --text:      #e2ddd5;
      --dim:       #6a6560;
      --dim2:      #4a4540;
      --accent:    #c8a87a;
      --sage:      #8aab94;
      --user:      #7090a8;
      --danger:    #b86868;
      --font:      'Georgia', 'Times New Roman', serif;
      --mono:      'Courier New', monospace;
      --chat-max:  640px;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-size: 15px;
      line-height: 1.7;
    }

    /* ── Root layout: single column, conversation-first ────────────── */
    #app {
      display: flex;
      flex-direction: column;
      height: 100vh;
      max-width: 760px;
      margin: 0 auto;
      position: relative;
    }

    /* ── Identity mark — minimal, near-invisible ────────────────────── */
    #identity-mark {
      position: fixed;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 760px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 24px 10px;
      pointer-events: none;
      z-index: 10;
      /* Fades away as you scroll into conversation */
      background: linear-gradient(to bottom, var(--bg) 60%, transparent);
    }

    #mark-name {
      font-size: 13px;
      letter-spacing: 0.22em;
      color: var(--dim);
      font-family: var(--mono);
      font-weight: normal;
      text-transform: lowercase;
      pointer-events: none;
      user-select: none;
    }

    #mark-name.connected {
      color: var(--dim);
    }

    /* The only interactive element in the top bar: inner-pane trigger */
    #panel-trigger {
      width: 28px;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: none;
      border: none;
      cursor: pointer;
      color: var(--dim2);
      font-size: 15px;
      pointer-events: all;
      transition: color 0.2s;
      border-radius: 50%;
      flex-shrink: 0;
    }
    #panel-trigger:hover { color: var(--dim); }
    #panel-trigger.open  { color: var(--accent); }

    /* ── Chat scroll container ──────────────────────────────────────── */
    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 60px 24px 12px;
      display: flex;
      flex-direction: column;
      /* No explicit gap — turns use margin for breathing */
    }

    /* ── Conversation turns ─────────────────────────────────────────── */
    .turn {
      display: flex;
      flex-direction: column;
      max-width: var(--chat-max);
      margin-bottom: 28px;
    }

    .turn.user {
      align-self: flex-end;
      align-items: flex-end;
    }

    .turn.sage {
      align-self: flex-start;
      align-items: flex-start;
      padding-left: 14px;
      border-left: 1px solid #1e2e24;
    }

    /* Turn label — very small, very quiet */
    .turn-label {
      font-size: 9px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      font-family: var(--mono);
      margin-bottom: 5px;
      user-select: none;
    }
    .turn.user  .turn-label { color: var(--dim2); }
    .turn.sage  .turn-label { color: #364d3c; }

    /* Message text — no bounding box, no background fill */
    .bubble {
      font-size: 14.5px;
      line-height: 1.78;
      white-space: pre-wrap;
      word-break: break-word;
      color: var(--text);
    }

    /* User text is slightly dimmer — Sage is the primary voice */
    .turn.user .bubble {
      color: #aabcc8;
      text-align: right;
    }

    .turn.sage .bubble {
      color: var(--text);
    }

    /* Streaming cursor */
    .bubble.streaming::after {
      content: '▋';
      animation: blink 0.85s step-end infinite;
      color: var(--sage);
      opacity: 0.6;
      margin-left: 2px;
    }

    @keyframes blink {
      50% { opacity: 0; }
    }

    /* ── Input zone ─────────────────────────────────────────────────── */
    #input-zone {
      flex-shrink: 0;
      padding: 10px 24px 22px;
      position: relative;
    }

    /* Soft fade above the input */
    #input-zone::before {
      content: '';
      position: absolute;
      top: -32px;
      left: 0;
      right: 0;
      height: 32px;
      background: linear-gradient(to bottom, transparent, var(--bg));
      pointer-events: none;
    }

    /* Search context indicator — subtle, inline */
    #search-context-indicator {
      display: none;
      align-items: center;
      gap: 8px;
      font-family: var(--mono);
      font-size: 10px;
      color: var(--accent);
      margin-bottom: 7px;
      padding-left: 2px;
    }
    #search-context-indicator.active { display: flex; }

    #clear-search-btn {
      background: none;
      border: none;
      color: var(--dim2);
      cursor: pointer;
      font-size: 11px;
      padding: 0;
      line-height: 1;
      transition: color 0.15s;
    }
    #clear-search-btn:hover { color: var(--danger); }

    /* Input row */
    #message-row {
      display: flex;
      align-items: flex-end;
      gap: 10px;
    }

    #message-input {
      flex: 1;
      background: transparent;
      border: none;
      border-bottom: 1px solid var(--muted);
      border-radius: 0;
      color: var(--text);
      font-family: var(--font);
      font-size: 14.5px;
      padding: 8px 2px;
      outline: none;
      resize: none;
      min-height: 38px;
      max-height: 130px;
      overflow-y: auto;
      line-height: 1.55;
      transition: border-color 0.2s;
    }

    #message-input:focus { border-bottom-color: var(--sage); }
    #message-input::placeholder { color: var(--dim2); font-style: italic; }
    #message-input:disabled { opacity: 0.5; }

    /* Send — just a glyph, no border, no label */
    #send-btn {
      background: none;
      border: none;
      color: var(--dim);
      font-size: 18px;
      cursor: pointer;
      padding: 4px 2px 6px;
      line-height: 1;
      transition: color 0.2s;
      flex-shrink: 0;
      font-family: var(--mono);
    }
    #send-btn:hover:not(:disabled) { color: var(--sage); }
    #send-btn:disabled { opacity: 0.25; cursor: not-allowed; }

    /* Retry — barely visible; accessible but not intrusive */
    #retry-btn {
      background: none;
      border: none;
      color: var(--dim2);
      font-size: 11px;
      cursor: pointer;
      padding: 4px 2px 6px;
      line-height: 1;
      transition: color 0.2s;
      flex-shrink: 0;
      font-family: var(--mono);
      letter-spacing: 0.04em;
    }
    #retry-btn:hover { color: var(--accent); }

    /* ── Inner pane (overlay, slides in from right) ─────────────────── */
    #inner-pane {
      position: fixed;
      top: 0;
      right: -320px;
      width: 300px;
      height: 100vh;
      background: var(--surface);
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      transition: right 0.28s cubic-bezier(0.4, 0, 0.2, 1);
      z-index: 100;
      overflow: hidden;
    }

    #inner-pane.open {
      right: 0;
    }

    /* Pane header */
    .pane-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 16px 12px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    /* Tab row — compact, monospace, subdued */
    .pane-tabs {
      display: flex;
      gap: 0;
      flex: 1;
    }

    .pane-tab {
      background: none;
      border: none;
      color: var(--dim);
      font-family: var(--mono);
      font-size: 9.5px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      padding: 4px 9px;
      transition: color 0.15s;
      border-bottom: 1px solid transparent;
      white-space: nowrap;
    }

    .pane-tab.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }

    .pane-tab:hover:not(.active) { color: var(--text); }

    /* Close button */
    #pane-close {
      background: none;
      border: none;
      color: var(--dim2);
      font-size: 16px;
      cursor: pointer;
      padding: 0 0 0 8px;
      line-height: 1;
      transition: color 0.15s;
      flex-shrink: 0;
    }
    #pane-close:hover { color: var(--dim); }

    /* Pane content areas */
    .pane-content {
      display: none;
      flex: 1;
      overflow-y: auto;
      padding: 16px;
    }
    .pane-content.active { display: block; }

    /* Memory / reflection entries */
    .memory-entry {
      font-size: 12px;
      line-height: 1.6;
      color: #b0aca4;
      margin-bottom: 12px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
      white-space: pre-wrap;
      word-break: break-word;
    }
    .memory-entry:last-child { border-bottom: none; margin-bottom: 0; }

    .sage-entry {
      color: #9ab4a0;
      font-style: italic;
    }

    .empty-state {
      color: var(--dim);
      font-size: 11.5px;
      font-family: var(--mono);
      text-align: center;
      padding: 24px 0;
    }

    /* Section label inside panes — even quieter */
    .pane-section-label {
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--dim2);
      margin-bottom: 10px;
      margin-top: 18px;
    }
    .pane-section-label:first-child { margin-top: 0; }

    /* Library pane */
    .lib-cat {
      margin-bottom: 14px;
    }
    .lib-cat-label {
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--dim2);
      margin-bottom: 6px;
    }
    .lib-entry-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 4px 6px;
      border-radius: 3px;
      cursor: pointer;
      font-size: 12.5px;
      color: #b0aca4;
    }
    .lib-entry-row:hover { background: var(--border); color: var(--text); }
    .lib-delete-btn {
      background: none;
      border: none;
      color: var(--dim2);
      cursor: pointer;
      font-size: 11px;
      padding: 0 3px;
      line-height: 1;
      opacity: 0;
      transition: opacity 0.15s, color 0.15s;
    }
    .lib-entry-row:hover .lib-delete-btn { opacity: 1; }
    .lib-delete-btn:hover { color: var(--danger); }

    /* Status pane */
    .status-row {
      display: flex;
      justify-content: space-between;
      padding: 5px 0;
      border-bottom: 1px solid var(--border);
      font-size: 11px;
    }
    .status-key { color: var(--dim);  font-family: var(--mono); }
    .status-val { color: #b0aca4;     font-family: var(--mono); }
    .status-ok  { color: var(--sage); }
    .status-warn{ color: var(--accent); }

    /* ── Directive pane — interior configuration, not settings panel ── */
    #directive-editor {
      display: flex;
      flex-direction: column;
      height: 100%;
      gap: 10px;
    }

    /* Subtle descriptor above the textarea — not a label, more like a state */
    #directive-context-note {
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: 0.12em;
      color: var(--dim2);
      text-transform: lowercase;
      padding-bottom: 6px;
      border-bottom: 1px solid var(--border);
    }

    #directive-textarea {
      flex: 1;
      background: transparent;
      border: none;
      color: #c8c4bc;
      font-family: var(--mono);
      font-size: 11px;
      line-height: 1.7;
      padding: 4px 0;
      resize: none;
      outline: none;
      min-height: 200px;
    }
    #directive-textarea:focus { color: var(--text); }

    #directive-actions {
      display: flex;
      align-items: center;
      gap: 10px;
      border-top: 1px solid var(--border);
      padding-top: 8px;
    }

    #directive-save-btn {
      background: transparent;
      border: none;
      color: var(--dim);
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.08em;
      padding: 3px 0;
      cursor: pointer;
      transition: color 0.15s;
      text-transform: lowercase;
    }
    #directive-save-btn:hover:not(:disabled) { color: var(--accent); }
    #directive-save-btn:disabled { opacity: 0.3; cursor: default; }

    #directive-status {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--dim2);
      transition: opacity 0.4s;
    }
    #directive-status.ok  { color: var(--sage); }
    #directive-status.err { color: var(--danger); }

    /* ── Backdrop for inner pane on mobile ──────────────────────────── */
    #pane-backdrop {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      z-index: 99;
      opacity: 0;
      transition: opacity 0.28s;
    }
    #pane-backdrop.open {
      display: block;
      opacity: 1;
    }

    /* ── Scrollbar ──────────────────────────────────────────────────── */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--muted); border-radius: 2px; }

    /* ── Responsive ─────────────────────────────────────────────────── */
    @media (max-width: 540px) {
      #app { max-width: 100%; }
      #chat { padding: 54px 16px 10px; }
      #input-zone { padding: 8px 16px 20px; }
      #inner-pane { width: 86vw; }
      #identity-mark { padding: 12px 16px 8px; }
    }
  </style>
</head>
<body>

<div id="app">

  <!-- Identity mark — fixed, minimal, near-invisible -->
  <div id="identity-mark">
    <span id="mark-name">sage</span>
    <button id="panel-trigger" title="inner" aria-label="open inner pane">⋯</button>
  </div>

  <!-- Chat — pure conversation, no bounding infrastructure -->
  <main id="chat"></main>

  <!-- Input zone -->
  <section id="input-zone">
    <!-- Search context indicator: only appears after /search command -->
    <div id="search-context-indicator">
      <span id="search-context-label">⚬ search context loaded</span>
      <button id="clear-search-btn" title="clear search context">✕</button>
    </div>

    <div id="message-row">
      <textarea
        id="message-input"
        rows="1"
        placeholder="…"
        autocomplete="off"
        spellcheck="false"
      ></textarea>
      <button id="send-btn" title="send (enter)">↵</button>
      <button id="retry-btn" title="retry last">↺</button>
    </div>
  </section>

</div><!-- /#app -->

<!-- Backdrop (closes pane when clicked outside on mobile) -->
<div id="pane-backdrop"></div>

<!-- Inner pane — slides in from right, overlay only -->
<div id="inner-pane">

  <div class="pane-header">
    <div class="pane-tabs">
      <button class="pane-tab active" data-pane="memories">memory</button>
      <button class="pane-tab"        data-pane="library">library</button>
      <button class="pane-tab"        data-pane="sage-inner">inner</button>
      <button class="pane-tab"        data-pane="status">status</button>
      <button class="pane-tab"        data-pane="directive">directive</button>
    </div>
    <button id="pane-close" title="close" aria-label="close inner pane">×</button>
  </div>

  <!-- User memories -->
  <div id="pane-memories" class="pane-content active">
    <div class="pane-section-label">recent episodes</div>
    <div id="episodes-list"><p class="empty-state">loading…</p></div>
  </div>

  <!-- Library -->
  <div id="pane-library" class="pane-content">
    <div id="library-tree"><p class="empty-state">loading…</p></div>
  </div>

  <!-- Sage inner -->
  <div id="pane-sage-inner" class="pane-content">
    <div class="pane-section-label">sage's reflections</div>
    <div id="sage-reflections-list"><p class="empty-state">loading…</p></div>
  </div>

  <!-- Status -->
  <div id="pane-status" class="pane-content">
    <div class="pane-section-label">system</div>
    <div id="status-rows"><p class="empty-state">loading…</p></div>
  </div>

  <!-- Directive — Phase 2A: live-editable identity spine -->
  <div id="pane-directive" class="pane-content">
    <div id="directive-editor">
      <div id="directive-context-note">what sage is</div>
      <textarea id="directive-textarea" spellcheck="false" placeholder="loading…"></textarea>
      <div id="directive-actions">
        <button id="directive-save-btn">write</button>
        <span id="directive-status"></span>
      </div>
    </div>
  </div>

</div><!-- /#inner-pane -->

<script>
/* ══════════════════════════════════════════════════════════════════
   Sage V2 — Frontend JavaScript  (Phase 2B: Presence Restoration)
   Single-file, no framework, no build step.
   All Phase 2A functionality preserved intact.
   ══════════════════════════════════════════════════════════════════ */

'use strict';

// ── State ──────────────────────────────────────────────────────────
let _streaming     = false;
let _pollTimer     = null;
let _currentJid    = null;
let _pollOffset    = 0;
let _searchContext = "";   // structured context block from /search command
let _paneOpen      = false;

// ── DOM refs ───────────────────────────────────────────────────────
const chatEl         = document.getElementById('chat');
const messageInput   = document.getElementById('message-input');
const sendBtn        = document.getElementById('send-btn');
const retryBtn       = document.getElementById('retry-btn');
const searchInd      = document.getElementById('search-context-indicator');
const searchLabel    = document.getElementById('search-context-label');
const clearSearchBtn = document.getElementById('clear-search-btn');
const markName       = document.getElementById('mark-name');
const panelTrigger   = document.getElementById('panel-trigger');
const innerPane      = document.getElementById('inner-pane');
const paneClose      = document.getElementById('pane-close');
const paneBackdrop   = document.getElementById('pane-backdrop');
const directiveTA    = document.getElementById('directive-textarea');
const directiveSave  = document.getElementById('directive-save-btn');
const directiveStat  = document.getElementById('directive-status');

// ── Inner pane open/close ──────────────────────────────────────────
function openPane() {
  _paneOpen = true;
  innerPane.classList.add('open');
  paneBackdrop.classList.add('open');
  panelTrigger.classList.add('open');
}

function closePane() {
  _paneOpen = false;
  innerPane.classList.remove('open');
  paneBackdrop.classList.remove('open');
  panelTrigger.classList.remove('open');
}

panelTrigger.addEventListener('click', () => _paneOpen ? closePane() : openPane());
paneClose.addEventListener('click', closePane);
paneBackdrop.addEventListener('click', closePane);

// ── Pane tab switching ─────────────────────────────────────────────
document.querySelectorAll('.pane-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.pane-tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.pane-content').forEach(p => p.classList.remove('active'));
    tab.classList.add('active');
    const paneId = 'pane-' + tab.dataset.pane;
    document.getElementById(paneId)?.classList.add('active');
    if (tab.dataset.pane === 'memories')   loadUserMemories();
    if (tab.dataset.pane === 'library')    loadLibrary();
    if (tab.dataset.pane === 'sage-inner') loadSageReflections();
    if (tab.dataset.pane === 'status')     loadStatus();
    if (tab.dataset.pane === 'directive')  loadDirective();
  });
});

// ── Auto-resize textarea ───────────────────────────────────────────
messageInput.addEventListener('input', () => {
  messageInput.style.height = 'auto';
  messageInput.style.height = Math.min(messageInput.scrollHeight, 130) + 'px';
});

// ── Send on Enter (Shift+Enter for newline) ────────────────────────
messageInput.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    if (!_streaming) sendMessage();
  }
});

sendBtn.addEventListener('click', () => { if (!_streaming) sendMessage(); });
retryBtn.addEventListener('click', () => { if (!_streaming) retryMessage(); });

// ── Clear search context ───────────────────────────────────────────
clearSearchBtn.addEventListener('click', () => {
  _searchContext = "";
  searchInd.classList.remove('active');
  searchLabel.textContent = '⚬ search context loaded';
});

// ── Core: send message ─────────────────────────────────────────────
// Phase 2A invariant preserved:
// /search <query> intercepts the input and runs a search.
// No visible search bar. Search context loads silently.
async function sendMessage() {
  const text = messageInput.value.trim();
  if (!text) return;

  // /search command — Phase 2A behavior unchanged
  if (text.startsWith('/search ')) {
    const query = text.slice(8).trim();
    if (query) {
      messageInput.value = '';
      messageInput.style.height = 'auto';
      await runSearch(query);
    }
    return;
  }

  appendTurn('user', text);
  messageInput.value = '';
  messageInput.style.height = 'auto';
  setStreaming(true);

  try {
    const resp = await fetch('/api/chat', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ message: text, search_context: _searchContext }),
    });
    const { jid } = await resp.json();

    if (_searchContext) {
      _searchContext = "";
      searchInd.classList.remove('active');
    }

    startPolling(jid);
  } catch (err) {
    appendTurn('sage', `couldn't reach sage. (${err.message})`);
    setStreaming(false);
  }
}

// ── Core: retry ────────────────────────────────────────────────────
async function retryMessage() {
  setStreaming(true);
  try {
    const resp = await fetch('/api/retry', { method: 'POST' });
    const { jid } = await resp.json();
    startPolling(jid);
  } catch (err) {
    appendTurn('sage', `retry failed. (${err.message})`);
    setStreaming(false);
  }
}

// ── Polling ────────────────────────────────────────────────────────
function startPolling(jid) {
  _currentJid  = jid;
  _pollOffset  = 0;
  const bubble = appendTurn('sage', '', true);
  schedulePoll(bubble);
}

function schedulePoll(bubble) {
  _pollTimer = setTimeout(() => poll(bubble), 80);
}

async function poll(bubble) {
  try {
    const resp = await fetch(`/api/poll/${_currentJid}?frm=${_pollOffset}`);
    if (!resp.ok) { finishStreaming(bubble); return; }

    const data = await resp.json();

    if (data.text) {
      bubble.textContent += data.text;
      _pollOffset += data.new_count;
      scrollChat();
    }

    if (data.done) {
      finishStreaming(bubble);
    } else {
      schedulePoll(bubble);
    }
  } catch (err) {
    bubble.textContent += `\n⚠ poll error: ${err.message}`;
    finishStreaming(bubble);
  }
}

function finishStreaming(bubble) {
  bubble.classList.remove('streaming');
  setStreaming(false);
  refreshPanels();
}

// ── Search — Phase 2A, internal only ──────────────────────────────
async function runSearch(query) {
  if (!query) return;
  messageInput.placeholder = `searching…`;

  try {
    const resp = await fetch('/api/search', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ query }),
    });
    const data = await resp.json();

    if (data.context_block) {
      _searchContext = data.context_block;
      searchInd.classList.add('active');
      searchLabel.textContent = `⚬ "${query}" — ${data.result_count} results`;
    } else {
      searchLabel.textContent = '⚬ no results';
      searchInd.classList.add('active');
    }
  } catch (err) {
    searchLabel.textContent = '⚬ search error';
    searchInd.classList.add('active');
  } finally {
    messageInput.placeholder = '…';
  }
}

// ── DOM helpers ────────────────────────────────────────────────────
function appendTurn(role, text, streaming = false) {
  const turn = document.createElement('div');
  turn.className = `turn ${role === 'user' ? 'user' : 'sage'}`;

  const label = document.createElement('div');
  label.className = 'turn-label';
  label.textContent = role === 'user' ? 'you' : 'sage';

  const bubble = document.createElement('div');
  bubble.className = 'bubble' + (streaming ? ' streaming' : '');
  bubble.textContent = text;

  turn.appendChild(label);
  turn.appendChild(bubble);
  chatEl.appendChild(turn);
  scrollChat();
  return bubble;
}

function scrollChat() {
  chatEl.scrollTop = chatEl.scrollHeight;
}

function setStreaming(v) {
  _streaming             = v;
  sendBtn.disabled       = v;
  messageInput.disabled  = v;
}

// ── Panel data loaders ─────────────────────────────────────────────
function refreshPanels() {
  if (!_paneOpen) return;
  const activeTab = document.querySelector('.pane-tab.active')?.dataset?.pane;
  if (activeTab === 'memories')   loadUserMemories();
  if (activeTab === 'library')    loadLibrary();
  if (activeTab === 'sage-inner') loadSageReflections();
  if (activeTab === 'status')     loadStatus();
  // directive pane does NOT auto-refresh — user edits must not be clobbered
}

// ── Directive pane — Phase 2A live-editable identity spine ─────────
async function loadDirective() {
  if (!directiveTA) return;
  directiveTA.value = '';
  directiveStat.textContent = '';
  directiveStat.className = '';
  try {
    const resp = await fetch('/api/directive');
    const data = await resp.json();
    directiveTA.value = data.content || '';
  } catch (err) {
    directiveStat.textContent = 'load error';
    directiveStat.className = 'err';
  }
}

directiveSave?.addEventListener('click', async () => {
  const content = directiveTA?.value?.trim();
  if (!content) return;
  directiveSave.disabled    = true;
  directiveStat.textContent = 'writing…';
  directiveStat.className   = '';
  try {
    const resp = await fetch('/api/directive', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ content }),
    });
    const data = await resp.json();
    if (data.ok) {
      directiveStat.textContent = 'written.';
      directiveStat.className   = 'ok';
      // Fade status out after 2.5s
      setTimeout(() => {
        directiveStat.textContent = '';
        directiveStat.className   = '';
      }, 2500);
    } else {
      directiveStat.textContent = 'error.';
      directiveStat.className   = 'err';
    }
  } catch (err) {
    directiveStat.textContent = 'failed.';
    directiveStat.className   = 'err';
  } finally {
    directiveSave.disabled = false;
  }
});

// ── Memory loaders ─────────────────────────────────────────────────
async function loadUserMemories() {
  const el = document.getElementById('episodes-list');
  try {
    const { episodes } = await (await fetch('/api/memories/user?n=8')).json();
    if (!episodes?.length) { el.innerHTML = '<p class="empty-state">no episodes yet</p>'; return; }
    el.innerHTML = episodes.map(ep =>
      `<div class="memory-entry">${escHtml(ep)}</div>`
    ).join('');
  } catch { el.innerHTML = '<p class="empty-state">unavailable</p>'; }
}

async function loadLibrary() {
  const el = document.getElementById('library-tree');
  try {
    const { library } = await (await fetch('/api/library')).json();
    const cats = Object.entries(library);
    if (!cats.some(([, names]) => names.length)) {
      el.innerHTML = '<p class="empty-state">library empty</p>'; return;
    }
    el.innerHTML = cats.map(([cat, names]) => {
      if (!names.length) return '';
      const rows = names.map(name =>
        `<div class="lib-entry-row" onclick="viewLibEntry('${escAttr(cat)}','${escAttr(name)}')">
           <span>${escHtml(name.replace(/_/g,' '))}</span>
           <button class="lib-delete-btn" onclick="deleteLibEntry(event,'${escAttr(cat)}','${escAttr(name)}')" title="delete">✕</button>
         </div>`
      ).join('');
      return `<div class="lib-cat">
        <div class="lib-cat-label">${escHtml(cat)}</div>
        ${rows}
      </div>`;
    }).join('');
  } catch { el.innerHTML = '<p class="empty-state">unavailable</p>'; }
}

async function viewLibEntry(cat, name) {
  try {
    const { content } = await (await fetch(`/api/library/${cat}/${name}`)).json();
    alert(`[${cat}/${name}]\n\n${content}`);
  } catch { alert('Could not load entry.'); }
}

async function deleteLibEntry(e, cat, name) {
  e.stopPropagation();
  if (!confirm(`Delete "${name}" from ${cat}?`)) return;
  try {
    await fetch(`/api/library/${cat}/${name}`, { method: 'DELETE' });
    loadLibrary();
  } catch { alert('Delete failed.'); }
}

async function loadSageReflections() {
  const el = document.getElementById('sage-reflections-list');
  try {
    const { reflections } = await (await fetch('/api/memories/sage?n=5')).json();
    if (!reflections?.length) { el.innerHTML = '<p class="empty-state">no reflections yet</p>'; return; }
    el.innerHTML = reflections.map(r =>
      `<div class="memory-entry sage-entry">${escHtml(r)}</div>`
    ).join('');
  } catch { el.innerHTML = '<p class="empty-state">unavailable</p>'; }
}

async function loadStatus() {
  const el = document.getElementById('status-rows');
  try {
    const d = await (await fetch('/api/status')).json();
    const budget = d.search_budget || {};
    el.innerHTML = [
      row('server',         'ok', 'ok'),
      row('session turns',  d.session_turns),
      row('history turns',  d.history_turns),
      row('daemon',         d.daemon_running ? 'running' : 'stopped',
                            d.daemon_running ? 'ok' : 'warn'),
      row('memory domains', (d.memory_domains||[]).join(', ')),
      row('search today',   `${budget.count||0} / ${budget.max||10}`),
      row('search budget',  `${budget.remaining||0} remaining`,
                            (budget.remaining > 0) ? 'ok' : 'warn'),
    ].join('');
  } catch {
    el.innerHTML = '<p class="empty-state">unavailable</p>';
  }
}

function row(key, val, cls = '') {
  const valClass = cls ? ` status-${cls}` : '';
  return `<div class="status-row">
    <span class="status-key">${escHtml(key)}</span>
    <span class="status-val${valClass}">${escHtml(String(val))}</span>
  </div>`;
}

// ── String helpers ─────────────────────────────────────────────────
function escHtml(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function escAttr(s) {
  return String(s).replace(/'/g,"\\'");
}

// ── Boot ───────────────────────────────────────────────────────────
// Header status text removed from primary view.
// Sage is connected when messages arrive — no uptime banner needed.
(async function boot() {
  try {
    // Pre-warm status silently — no DOM update in primary view
    await fetch('/api/status').catch(() => {});
    markName.classList.add('connected');
  } catch { /* not critical */ }
})();
</script>
